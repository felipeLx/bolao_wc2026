<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão da Copa 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>

<header>
  <h1>⚽ Bolão da Copa 2026</h1>
</header>

<!-- ============ TELA DE ENTRADA ============ -->
<section id="screen-entry" hidden>
  <form id="entry-form" class="panel">
    <h2>Entrar no bolão</h2>

    <label for="entry-pool">Bolão</label>
    <select id="entry-pool"></select>

    <div id="entry-newname-row" hidden>
      <label for="entry-newname">Nome do novo bolão</label>
      <input id="entry-newname" type="text" maxlength="40" placeholder="ex: Amigos da Firma">
    </div>

    <label for="entry-name">Seu nome ou apelido</label>
    <input id="entry-name" type="text" maxlength="30" placeholder="como você quer aparecer no ranking">

    <label for="entry-email">Seu e-mail</label>
    <input id="entry-email" type="email" placeholder="voce@email.com">

    <label class="checkbox">
      <input id="entry-rules" type="checkbox">
      <span>Aceito as <b>regras do bolão</b> e me comprometo a pagar
      <b>R$ 100,00</b> até uma semana antes da final.</span>
    </label>

    <button type="submit" class="primary">Entrar</button>
    <p id="entry-msg" class="msg"></p>
  </form>
</section>

<!-- ============ TELA PRINCIPAL ============ -->
<section id="screen-main" hidden>
  <div class="topbar">
    <div>
      <b id="main-pool-name"></b>
      <span class="muted">· <span id="main-user"></span></span>
    </div>
    <div class="topbar-actions">
      <button id="btn-reload" class="ghost" title="Atualizar dados">🔄</button>
      <button id="btn-leave" class="ghost" title="Trocar de bolão">Trocar bolão</button>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="palpites">Palpites</button>
    <button class="tab-btn" data-tab="classificacao">Classificação</button>
    <button class="tab-btn" data-tab="pagamentos">Pago</button>
    <button class="tab-btn" data-tab="regras">Regras</button>
    <button class="tab-btn" data-tab="resultados" id="tab-btn-resultados" hidden>Resultados</button>
  </nav>

  <div id="tab-palpites" class="tab-panel">
    <label class="checkbox filter">
      <input id="filter-all" type="checkbox">
      <span>Mostrar todos os jogos (inclusive fechados e a definir)</span>
    </label>
    <div id="palpites-list"></div>
    <div id="save-bar" hidden>
      <button id="save-btn" class="primary">Salvar palpites</button>
      <span><span id="save-count">0</span> alteração(ões) não salva(s)</span>
    </div>
  </div>

  <div id="tab-classificacao" class="tab-panel" hidden>
    <div id="classificacao-content"></div>
  </div>

  <div id="tab-regras" class="tab-panel" hidden>
    <div id="regras-content"></div>
  </div>

  <div id="tab-resultados" class="tab-panel" hidden>
    <div class="save-area" style="margin-bottom:12px">
      <button id="results-save" class="primary">Salvar resultados</button>
      <!--<p class="muted small">Puxa automaticamente os placares de jogos finalizados. Você também pode corrigir manualmente abaixo.</p>-->
    </div>
    <div id="resultados-list"></div>
    <div id="results-save-bar" class="floating-bar" hidden>
      <!--<button id="results-save" class="primary">Salvar resultados</button>-->
      <span id="results-dirty-count">
    </div>
  </div>

  <div id="tab-pagamentos" class="tab-panel" hidden>
    <div id="pagamentos-content"></div>
  </div>
</section>

<!-- ============ MODAL: PALPITES DE UM PARTICIPANTE ============ -->
<div id="member-modal" class="modal" hidden>
  <div class="modal-box">
    <div id="member-detail"></div>
    <div class="modal-actions">
      <button id="member-close" class="primary">Fechar</button>
    </div>
  </div>
</div>

<div id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
